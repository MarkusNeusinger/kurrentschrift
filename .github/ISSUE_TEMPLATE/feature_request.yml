name: Feature request
description: Suggest an idea or improvement for kurrentschrift
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea! For open-ended questions or discussion, please use
        [Discussions](https://github.com/MarkusNeusinger/kurrentschrift/discussions) instead.

  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do, and where does the project get in the way today?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to happen?
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else — example scans, glyphs, references, mockups.
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and discussions and did not find a duplicate.
          required: true
