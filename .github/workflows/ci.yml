name: CI

# Lint + test gate for backend (Python/uv) and frontend (React/Vite).
# Modelled after the anyplot pipeline: Ruff for lint+format, pytest for the
# compute/API layer, tsc+vite build for the SPA. Keep this in sync with the
# local dev commands documented in CLAUDE.md.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend (ruff + pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --extra dev --extra test --frozen

      - name: Ruff lint
        run: uv run ruff check --output-format=github .

      - name: Ruff format
        run: uv run ruff format --check .

      - name: Pytest
        run: uv run pytest --cov=core --cov=api --cov-report=xml

      - name: Upload coverage to Codecov
        # Skip on fork PRs (CODECOV_TOKEN is not exposed to them). fail_ci_if_error
        # stays false so a missing token / codecov hiccup never reds CI.
        if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: backend
          fail_ci_if_error: false

  migrations:
    name: Migrations (alembic upgrade head)
    runs-on: ubuntu-latest
    # Full migration chain incl. seeds against a real Postgres 16 — catches
    # broken revisions, JSONB/DDL issues and seed-file drift that the SQLite
    # test harness cannot see. The service DB is throwaway; no shared Cloud SQL
    # instance is ever touched here.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: kurrentschrift
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      # Runtime dependencies suffice: alembic + asyncpg are project deps, and
      # the migration run needs neither the dev nor the test extras.
      - name: Install dependencies
        run: uv sync --frozen

      # alembic/env.py reads DATABASE_URL (async mode needs the asyncpg driver
      # in the URL) and falls back to INSTANCE_CONNECTION_NAME otherwise.
      - name: Alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/kurrentschrift
        run: uv run alembic upgrade head

      # Model ↔ migration drift: a model column added without a revision passes
      # `upgrade head` silently; autogenerate-diff against the migrated DB
      # catches it.
      - name: Alembic check (model/migration drift)
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/kurrentschrift
        run: uv run alembic check

      # Reversibility of the newest revision: downgrade one step and re-upgrade,
      # so a broken/missing downgrade never lands unnoticed.
      - name: Alembic downgrade/upgrade roundtrip
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/kurrentschrift
        run: uv run alembic downgrade -1 && uv run alembic upgrade head

  frontend:
    name: Frontend (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          # 22 = active LTS (Node 20 reached end-of-life 2026-04-30).
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      # Fast fixture-driven Vitest run — pins the shaping.ts ↔ core/shaping.py
      # twin against tests/fixtures/shaping_cases.json (the Python side asserts
      # the same fixture in tests/test_tri_script.py). --coverage feeds the
      # Codecov frontend flag so SPA patch coverage stops being invisible.
      - name: Test
        run: npm run test -- --coverage

      - name: Upload frontend coverage to Codecov
        if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./app/coverage/coverage-final.json
          flags: frontend
          fail_ci_if_error: false

      # `npm run build` is `tsc && vite build`, so this gates the type-check too.
      - name: Build
        run: npm run build
