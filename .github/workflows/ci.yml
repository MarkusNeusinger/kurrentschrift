name: CI

# Lint + test gate for backend (Python/uv) and frontend (React/Vite).
# Modelled after the anyplot pipeline: Ruff for lint+format, pytest for the
# compute/API layer, tsc+vite build for the SPA. Keep this in sync with the
# local dev commands documented in CLAUDE.md.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend (ruff + pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --extra dev --extra test --frozen

      - name: Ruff lint
        run: uv run ruff check --output-format=github .

      - name: Ruff format
        run: uv run ruff format --check .

      - name: Pytest
        run: uv run pytest --cov=core --cov=api --cov-report=xml

      - name: Upload coverage to Codecov
        # fail_ci_if_error stays false so a missing token / codecov hiccup never reds CI.
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: backend
          fail_ci_if_error: false

  frontend:
    name: Frontend (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      # `npm run build` is `tsc && vite build`, so this gates the type-check too.
      - name: Build
        run: npm run build
