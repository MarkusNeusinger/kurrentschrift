name: CI

# Lint + test gate for backend (Python/uv) and frontend (React/Vite).
# Modelled after the anyplot pipeline: Ruff for lint+format, pytest for the
# compute/API layer, tsc+vite build for the SPA. Keep this in sync with the
# local dev commands documented in CLAUDE.md.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend (ruff + pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --extra dev --extra test --frozen

      - name: Ruff lint
        run: uv run ruff check --output-format=github .

      - name: Ruff format
        run: uv run ruff format --check .

      - name: Pytest
        run: uv run pytest

  frontend:
    name: Frontend (type-check + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run type-check

      - name: Build
        run: npm run build
