# Cloud Build configuration for kurrentschrift backend API.
# Pattern mirrors ~/anyplot/api/cloudbuild.yaml.
substitutions:
  _SERVICE_NAME: kurrentschrift-api
  _REGION: europe-west4
  _MEMORY: 1Gi
  _CPU: "1"
  # min=0 keeps idle cost ~zero (cold start ~3s on first hit); max=1 caps the
  # blast radius since this is a personal-scale project.
  _MIN_INSTANCES: "0"
  _MAX_INSTANCES: "1"
  _RUNTIME_SA: "kurrentschrift-runtime@kurrentschrift.iam.gserviceaccount.com"
  # DB lives on the anyplot Cloud SQL instance; cross-project cloudsql.client
  # is granted to the runtime SA in the anyplot project.
  _CLOUDSQL_INSTANCE: "anyplot:europe-west4:anyplot-db"
  # Comma-separated allow-list for the CF Access JWT path. Browser users with a
  # valid JWT but an email not in this list get 403. Left EMPTY in the repo (as
  # in anyplot) — the real allow-list is injected at deploy time via the Cloud
  # Build trigger substitution. With this empty, the JWT/email path authorizes
  # no one and only the X-Admin-Token fallback (ADMIN_TOKEN secret) is active,
  # so an empty value never locks admin out.
  _ADMIN_ALLOWED_EMAILS: ""

steps:
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "europe-west4-docker.pkg.dev/$PROJECT_ID/kurrentschrift/${_SERVICE_NAME}:$BUILD_ID"
      - "-t"
      - "europe-west4-docker.pkg.dev/$PROJECT_ID/kurrentschrift/${_SERVICE_NAME}:latest"
      - "-f"
      - "api/Dockerfile"
      - "."
    id: "build-image"

  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "europe-west4-docker.pkg.dev/$PROJECT_ID/kurrentschrift/${_SERVICE_NAME}:$BUILD_ID"
    id: "push-image"
    waitFor: ["build-image"]

  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "europe-west4-docker.pkg.dev/$PROJECT_ID/kurrentschrift/${_SERVICE_NAME}:latest"
    id: "push-latest"
    waitFor: ["build-image"]

  # Apply DB migrations BEFORE the new code serves traffic. Runs as a Cloud Run
  # Job under the runtime SA, so it reaches Cloud SQL as the kurrentschrift role
  # (which owns its tables). The job
  # image is the same one we just built, so it carries the latest alembic/
  # revisions. --wait blocks the build (and thus the deploy) on the migration's
  # success, so a failed migration never ships a schema-mismatched service.
  - name: "gcr.io/cloud-builders/gcloud"
    args:
      - "run"
      - "jobs"
      - "deploy"
      - "kurrentschrift-migrate"
      - "--image=europe-west4-docker.pkg.dev/$PROJECT_ID/kurrentschrift/${_SERVICE_NAME}:$BUILD_ID"
      - "--region=${_REGION}"
      - "--service-account=${_RUNTIME_SA}"
      - "--set-secrets=DATABASE_URL=DATABASE_URL:latest"
      - "--set-cloudsql-instances=${_CLOUDSQL_INSTANCE}"
      - "--set-env-vars=ENVIRONMENT=production"
      - "--command=.venv/bin/alembic"
      - "--args=upgrade,head"
      - "--max-retries=0"
      - "--task-timeout=300"
      - "--execute-now"
      - "--wait"
    id: "migrate"
    waitFor: ["push-image"]

  - name: "gcr.io/cloud-builders/gcloud"
    args:
      - "run"
      - "deploy"
      - "${_SERVICE_NAME}"
      - "--image=europe-west4-docker.pkg.dev/$PROJECT_ID/kurrentschrift/${_SERVICE_NAME}:$BUILD_ID"
      - "--region=${_REGION}"
      - "--platform=managed"
      - "--service-account=${_RUNTIME_SA}"
      - "--memory=${_MEMORY}"
      - "--cpu=${_CPU}"
      - "--min-instances=${_MIN_INSTANCES}"
      - "--max-instances=${_MAX_INSTANCES}"
      - "--port=8000"
      - "--allow-unauthenticated"
      - "--add-cloudsql-instances=${_CLOUDSQL_INSTANCE}"
      - "--set-secrets=DATABASE_URL=DATABASE_URL:latest,ADMIN_TOKEN=ADMIN_TOKEN:latest,CF_ACCESS_TEAM_DOMAIN=CF_ACCESS_TEAM_DOMAIN:latest,CF_ACCESS_AUD=CF_ACCESS_AUD:latest"
      - "--execution-environment=gen2"
      # ^|^ alt delimiter: ADMIN_ALLOWED_EMAILS_RAW contains @ and may contain ,
      - "--set-env-vars=^|^ENVIRONMENT=production|ADMIN_ALLOWED_EMAILS_RAW=${_ADMIN_ALLOWED_EMAILS}"
      - "--cpu-throttling"
      - "--concurrency=15"
      - "--timeout=600"
    id: "deploy"
    waitFor: ["migrate"]

  # Post-deploy smoke against the freshly deployed revision: a bad image that
  # still answers /health can 500 on the real render path — probe the paths
  # the public site actually depends on, plus the fail-closed write gate.
  # Retries cover the min-instances=0 cold start.
  - name: "gcr.io/cloud-builders/gcloud"
    entrypoint: "bash"
    args:
      - "-ceu"
      - |
        URL=$$(gcloud run services describe ${_SERVICE_NAME} --region=${_REGION} --platform=managed --format='value(status.url)')
        echo "smoke against $$URL"
        # Retry EVERY probe: /health doesn't touch the DB, so the first /styles
        # or /write call can still be the first real DB request after the
        # min-instances=0 cold start and may fail transiently.
        RETRY="--retry 5 --retry-delay 5 --retry-all-errors"
        curl -fsS $$RETRY "$$URL/health" | grep -q '"healthy"'
        curl -fsS $$RETRY "$$URL/styles" | grep -q '"id"'
        curl -fsS $$RETRY "$$URL/sources/suetterlin-1922/write/word?text=lesen" | grep -q '"items"'
        # Fail-closed admin gate, probed via a body-less admin-gated GET so the
        # assertion can never race request-body validation.
        code=$$(curl -s $$RETRY -o /dev/null -w '%{http_code}' "$$URL/sources/suetterlin-1922/templates/n-medial/fit")
        test "$$code" = "401" || { echo "admin gate expected 401, got $$code"; exit 1; }
        echo "smoke OK"
    id: "smoke"
    waitFor: ["deploy"]

images:
  - "europe-west4-docker.pkg.dev/$PROJECT_ID/kurrentschrift/${_SERVICE_NAME}:$BUILD_ID"
  - "europe-west4-docker.pkg.dev/$PROJECT_ID/kurrentschrift/${_SERVICE_NAME}:latest"

options:
  logging: CLOUD_LOGGING_ONLY

timeout: "1200s"
