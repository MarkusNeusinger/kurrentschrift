# SPA-friendly nginx config for the kurrentschrift admin frontend.
# - /api/* is reverse-proxied to the API service (same Cloud Run project).
# - everything else falls back to index.html so client-side routing works
#   (v1 is single page anyway, but this keeps room for future routes).

server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Reverse-proxy API calls. In Cloud Run the upstream URL would be the
    # API service's URL — replace UPSTREAM_API_URL at deploy time, or use
    # Cloud Run's same-VPC service-to-service routing.
    location /api/ {
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Placeholder upstream — fill in for production:
        proxy_pass http://api:8000/;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /_health {
        access_log off;
        return 200 "ok\n";
    }
}
