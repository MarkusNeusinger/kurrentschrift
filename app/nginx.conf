# SPA-friendly nginx config for the kurrentschrift admin frontend.
#
# `/api/*` routing is handled by the Cloudflare Worker in front of this
# service (kurrentschrift.ink/api/* → api.kurrentschrift.ink), so nginx
# only serves the static React build and falls back to index.html for
# client-side routes. Requests hitting `*.run.app/api/*` directly bypass
# the Worker and get a 404 here — which is fine, they shouldn't be making
# them.

server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Cheap container health probe (used by Cloud Run startup checks).
    location = /_health {
        access_log off;
        return 200 "ok\n";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
