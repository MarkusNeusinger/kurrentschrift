<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#e7dabf" />
    <meta name="description" content="Lerne die alte deutsche Schreibschrift — Kurrent, Sütterlin, Offenbacher — lesen und schreiben: mit Schriftkunde, Buchstaben-Quiz, Schreibtafel, Übungsblättern und einer Feder, die live schreibt." />
    <title>kurrentschrift.ink</title>

    <!-- Brand icons: the viridian Kurrent K (GLKurrent face) on the paper
         gradient — same motif as CategoryHeading. Multi-size ICO answers the
         default /favicon.ico request; the 180px PNG covers "add to home screen". -->
    <link rel="icon" href="/favicon.ico" sizes="48x48" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Static SEO defaults (home / no-JS crawlers). usePageMeta overrides
         title, description, canonical and the og/twitter title+description+url
         per route at runtime. og:image stays absolute and route-independent so
         link previews (which never run JS) always get the card. -->
    <link rel="canonical" href="https://kurrentschrift.ink/" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="kurrentschrift.ink" />
    <meta property="og:locale" content="de_DE" />
    <meta property="og:url" content="https://kurrentschrift.ink/" />
    <meta property="og:title" content="kurrentschrift.ink — deutsche Kurrent & Sütterlin lesen und schreiben" />
    <meta property="og:description" content="Lerne die alte deutsche Schreibschrift — Kurrent, Sütterlin, Offenbacher — lesen und schreiben: mit Schriftkunde, Quiz, Schreibtafel, Übungsblättern und einer Feder, die live schreibt." />
    <meta property="og:image" content="https://kurrentschrift.ink/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Kurrentschrift — die alte deutsche Schreibschrift lesen und schreiben lernen" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="kurrentschrift.ink — deutsche Kurrent & Sütterlin lesen und schreiben" />
    <meta name="twitter:description" content="Lerne die alte deutsche Schreibschrift lesen und schreiben: Schriftkunde, Quiz, Schreibtafel, Übungsblätter und eine Feder, die live schreibt." />
    <meta name="twitter:image" content="https://kurrentschrift.ink/og.png" />
    <!-- `touch-action: manipulation` on the body only drops the double-tap
         zoom delay; it does not block panning/scrolling. Stylus capture is
         protected where it matters — the drawing surfaces set their own
         `touch-action: none`. We deliberately do NOT set
         `overscroll-behavior: none` on the root: that would also kill the
         native pull-to-refresh gesture on mobile, and the per-canvas guard
         already covers pen events. -->
    <style>
      html, body { margin: 0; padding: 0; height: 100%; }
      body { touch-action: manipulation; }
    </style>

    <!-- Privacy-friendly analytics by Plausible (production only). The script
         and event endpoint are both proxied through a Cloudflare Worker on
         kurrentschrift.ink/{js/script.js,pa/event} so requests stay same-origin
         and aren't blocked by adblockers. Events go to /pa/event (not the
         conventional /api/event) because /api/* is gated by Cloudflare Access
         for the admin SPA. The hostname gate keeps dev/preview builds from
         polluting prod stats. -->
    <script>
      window.plausible=window.plausible||function(){(plausible.q=plausible.q||[]).push(arguments)},plausible.init=plausible.init||function(i){plausible.o=i||{}};
      if (location.hostname === 'kurrentschrift.ink') {
        var s = document.createElement('script');
        s.async = true;
        s.src = '/js/script.js';
        document.head.appendChild(s);
        plausible.init({ endpoint: '/pa/event' });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
